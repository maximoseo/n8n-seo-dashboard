services:
  - type: web
    name: n8n-dashboard
    env: node
    region: oregon
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
